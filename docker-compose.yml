version: "3.8"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  worker:
    build: .
    command: rq worker -u redis://redis:6379 default
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
