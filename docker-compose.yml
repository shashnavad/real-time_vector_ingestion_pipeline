version: "3.8"

services:
  # Redpanda is a lightweight Kafka-compatible broker (no Zookeeper required)
  redpanda:
    image: vectorized/redpanda:latest
    command: ["redpanda", "start", "--overprovisioned", "--smp", "1", "--memory", "1G", "--reserve-memory", "0M", "--node-id", "0"]
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "bash", "-c", "rpk cluster info || exit 1"]

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - redis
      - redpanda

  worker:
    build: .
    command: rq worker -u redis://redis:6379 default
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - redis
      - redpanda

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__USE_CACHE=true
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sSf http://localhost:6333/collections || exit 1"]

volumes:
  qdrant_storage:
